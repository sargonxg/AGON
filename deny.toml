[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # Transitive through google-ai-rs; no fixed upgrade is available.
    "RUSTSEC-2023-0071",
    # Transitive through hnsw_rs; no fixed upgrade is available.
    "RUSTSEC-2025-0141",
    # Transitive through ascent; no fixed upgrade is available.
    "RUSTSEC-2024-0384",
    # Transitive through indicatif 0.17 in criterion; no fixed upgrade is available.
    "RUSTSEC-2025-0119",
    # Transitive through tokenizers/ascent; no fixed upgrade is available.
    "RUSTSEC-2024-0436",
    # Transitive through testcontainers/bollard in dev dependencies; no fixed upgrade is available.
    "RUSTSEC-2025-0134",
    "RUSTSEC-2025-0111",
]

[licenses]
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause", "BSD-3-Clause", "ISC",
    "Unicode-3.0", "MPL-2.0", "Zlib", "CC0-1.0",
    "NCSA", "CDLA-Permissive-2.0"
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
