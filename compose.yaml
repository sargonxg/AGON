services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agon
      POSTGRES_PASSWORD: agon
      POSTGRES_DB: agon
    ports:
      - "5432:5432"
    volumes:
      - agon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agon-pgdata:
