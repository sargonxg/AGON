name: bench
on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.*"

jobs:
  criterion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --no-run --workspace
